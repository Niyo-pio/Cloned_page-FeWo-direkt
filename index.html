<!DOCTYPE html>
<html lang="en">

<body>
    <head class="head">
        <nav>
            <div class="logo">FeWo-direkt</div>
        <div class="nav-bar">
            <a href="#" class="round-border">App offnem</a>
            <a href="#" class="blk">Reiseplaner</a>
            <a href="#" class="blk">U terkunft registrieren</a>
            <a href="#" class="blk">Hife</a>
            <a href="#" class="blk">Meine Reisen</a>

        <div class="pic">

            <h1 class="h1-head">Die ganze Unterkunft nur fur dich</h1>
            <div class="search-bar">

                 <div class="big_but btn-flex">

                    <div>

                        <p class="big_p">Sa., 14. Marz - S...</p>

                </div>

                    <div>
                        <p class="small_p">Gast</p>

                    </div>
                </div>
                  
                  <button class="btn"> <p>Suchen</p></button>
                  
            </div>

        </div>

    </head>
    <main class="main">
        <div class="pop">
            <img src="message.svg" alt="" class="hand">
            <p>Melde dich an, um dem Gastgeber eine Nachricht zu schicken und mehr Details zu einer Unterkunft zu erhalten.</p>
            <button class="anmeldon-btn">Anmeldon</button>
        </div>
